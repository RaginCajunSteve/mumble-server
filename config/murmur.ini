# Murmur configuration file
# See https://wiki.mumble.info/wiki/Murmur.ini for full options

# Port for both TCP and UDP
port=64738

# Bind to all interfaces
host=

# Server name shown to clients
servername=Alpha Mirror Mumble Server

# Welcome text
welcometext=<br />Welcome to the Alpha Mirror Mumble server.<br />Enjoy low-latency voice chat!

# Max users
users=100

# Bandwidth per user (in bits/sec). 128000 = ~16 kbit/s per user (good quality)
bandwidth=128000

# Password to join server (optional, leave empty for public)
serverpassword=

# SuperUser password is set via env or here
# superuserpassword=...

# Logging
logfile=/data/murmur.log
logdays=31

# Database (SQLite by default, good for small)
database=/data/murmur.sqlite

# Allow HTML in comments, etc.
allowhtml=true

# Opus codec (high quality, low latency)
opusthreshold=0

# Certificate (for TLS)
# If you want custom certs (e.g. from Let's Encrypt via Cloudflare), mount them
# sslCert=/config/cert.pem
# sslKey=/config/key.pem

# Register with Mumble public server list? (false for private)
registerName=
registerPassword=
registerUrl=
registerHostname=
